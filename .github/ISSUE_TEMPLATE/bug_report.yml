name: Bug Report
description: Report a bug in NormaDocs
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        ## Bug Description
        Please describe the bug clearly.
  - type: textarea
    id: description
    attributes:
      label: Description
      placeholder: Detailed description of the bug
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: NormaDocs Version
      placeholder: "0.2.0"
  - type: input
    id: pandoc-version
    attributes:
      label: Pandoc Version
      placeholder: "3.x"
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows
        - Other
  - type: textarea
    id: reproduction
    attributes:
      label: "Steps to Reproduce"
      placeholder: |
        1. Run `normadocs document.md`
        2. See error...
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output