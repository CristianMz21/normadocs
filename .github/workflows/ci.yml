name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_call: # ← Makes this reusable by release.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with Ruff (no noqa allowed)
        run: ruff check src/ tests/ --output-format=github --no-cache
        env:
          RUFF_NOQA: "1"

      - name: Format check with Ruff
        run: ruff format --check src/ tests/ --output-format=github --no-cache

      - name: Type check with MyPy
        run: mypy --strict src/

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Bandit
        run: bandit -r src/ -c pyproject.toml

  tests:
    name: Tests (Python ${{ matrix.python-version }})
    needs: [quality, security]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage (warnings as errors)
        run: pytest tests/ -W error --cov=normadocs --cov-report=term-missing --cov-report=xml --cov-fail-under=78

      - name: Upload coverage (3.12 only)
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml

  build-check:
    name: Build Distribution
    needs: tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install build tools
        run: pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Validate package metadata
        run: twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  annotations-check:
    name: Ensure Zero Annotations
    needs: [quality, security, tests, build-check]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
    steps:
      - name: Check for annotations
        shell: bash
        run: |
          repo_full="${{ github.repository }}"
          run_id="${{ github.run_id }}"
          
          echo "Checking run $run_id for annotations in $repo_full..."
          
          annotations=$(gh api repos/$repo_full/actions/runs/$run_id/jobs --jq '.jobs[].annotations // [] | length' 2>/dev/null | awk '{s+=$1} END {print s+0}' || echo "0")
          
          if [ -n "$annotations" ] && [ "$annotations" -gt 0 ] 2>/dev/null; then
            echo "Found $annotations annotation(s):"
            gh api repos/$repo_full/actions/runs/$run_id/jobs --jq '.jobs[] | select(.annotations | length > 0) | .name as $job | .annotations[] | "\($job): \(.message) (\(.path):\(.start_line))"' 2>/dev/null
            echo ""
            echo "::error::CI failed: $annotations annotation(s) found. Fix all warnings before merging."
            exit 1
          else
            echo "No annotations found. CI passed with zero warnings!"
          fi
