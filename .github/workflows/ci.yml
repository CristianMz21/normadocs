name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_call: # ← Makes this reusable by release.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with Ruff (no noqa allowed)
        run: ruff check src/ tests/ --output-format=github --no-cache
        env:
          RUFF_NOQA: "1"

      - name: Format check with Ruff
        run: ruff format --check src/ tests/ --output-format=github --no-cache

      - name: Type check with MyPy
        run: mypy --strict src/

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Bandit
        run: bandit -r src/ -c pyproject.toml

  tests:
    name: Tests (Python ${{ matrix.python-version }})
    needs: [quality, security]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage (warnings as errors)
        run: pytest tests/ -W error --cov=normadocs --cov-report=term-missing --cov-report=xml --cov-fail-under=78

      - name: Upload coverage (3.12 only)
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v5
        with:
          name: coverage-report
          path: coverage.xml

  build-check:
    name: Build Distribution
    needs: tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install build tools
        run: pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Validate package metadata
        run: twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/

  annotations-check:
    name: Ensure Zero Annotations
    needs: [quality, security, tests, build-check]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
    steps:
      - name: Check for annotations
        uses: actions/github-script@v7
        with:
          script: |
            const runId = context.runId;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            const response = await github.rest.actions.listJobsForWorkflowRun({
              owner,
              repo,
              run_id: runId
            });
            
            const jobs = response.data.jobs;
            let totalAnnotations = 0;
            let annotationDetails = [];
            
            for (const job of jobs) {
              if (job.annotations && job.annotations.length > 0) {
                totalAnnotations += job.annotations.length;
                for (const ann of job.annotations) {
                  annotationDetails.push(`[${job.name}] ${ann.annotation_type}: ${ann.message} (${ann.location.path}:${ann.location.start_line})`);
                }
              }
            }
            
            if (totalAnnotations > 0) {
              console.log('Found annotations:');
              annotationDetails.forEach(a => console.log(a));
              core.setFailed(`CI failed: ${totalAnnotations} annotation(s) found. Fix all warnings before merging.`);
            } else {
              console.log('No annotations found. CI passed with zero warnings!');
            }
