name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-tag:
    name: Validate Version Tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - name: Extract version from tag
        id: extract
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          if [ -z "$TAG" ] || [ "$TAG" = "$GITHUB_REF" ]; then
            echo "::error::Invalid tag format. Expected v*.*.*"
            exit 1
          fi
          echo "TAG_VERSION=$TAG" >> $GITHUB_ENV
          echo "VERSION=$TAG" >> $GITHUB_OUTPUT

      - name: Validate version matches pyproject.toml
        run: |
          PYPROJECT_VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "Tag version: $TAG_VERSION"
          echo "pyproject.toml version: $PYPROJECT_VERSION"
          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match pyproject.toml ($PYPROJECT_VERSION)"
            exit 1
          fi
          echo "Version validated successfully"

  quality:
    name: Lint & Type Check
    needs: [validate-tag]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with Ruff (no noqa allowed)
        run: ruff check src/ tests/ --output-format=github --no-cache
        env:
          RUFF_NOQA: "1"

      - name: Format check with Ruff
        run: ruff format --check src/ tests/ --output-format=github --no-cache

      - name: Type check with MyPy
        run: mypy --strict src/

  security:
    name: Security Scan
    needs: [validate-tag]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Bandit
        run: bandit -r src/ -c pyproject.toml

  tests:
    name: Tests (Python 3.12)
    needs: [quality, security]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage (warnings as errors)
        run: pytest tests/ -W error --cov=normadocs --cov-report=term-missing --cov-fail-under=78

  build-check:
    name: Build Distribution
    needs: [tests]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install build tools
        run: pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Validate package metadata
        run: twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/

  annotations-check:
    name: Ensure Zero Annotations
    needs: [quality, security, tests, build-check]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
    steps:
      - name: Check for annotations
        shell: bash
        run: |
          repo_full="${{ github.repository }}"
          run_id="${{ github.run_id }}"

          echo "Checking run $run_id for annotations in $repo_full..."

          annotations=$(gh api repos/$repo_full/actions/runs/$run_id/jobs --jq '.jobs[].annotations // [] | length' 2>/dev/null | awk '{s+=$1} END {print s+0}' || echo "0")

          if [ -n "$annotations" ] && [ "$annotations" -gt 0 ] 2>/dev/null; then
            echo "Found $annotations annotation(s):"
            gh api repos/$repo_full/actions/runs/$run_id/jobs --jq '.jobs[] | select(.annotations | length > 0) | .name as $job | .annotations[] | "\($job): \(.message) (\(.path):\(.start_line))"' 2>/dev/null
            echo ""
            echo "::error::CI failed: $annotations annotation(s) found. Fix all warnings before merging."
            exit 1
          else
            echo "No annotations found. CI passed with zero warnings!"
          fi

  publish:
    name: Upload to PyPI
    needs: [annotations-check]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    environment:
      name: pypi
      url: https://pypi.org/p/normadocs
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Check if version already exists on PyPI
        id: check-pypi
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Checking if version $VERSION exists on PyPI..."
          RESPONSE=$(curl -s "https://pypi.org/pypi/normadocs/$VERSION/json")
          PULLUP_VERSION=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('info',{}).get('version','NOT_FOUND'))" 2>/dev/null)
          echo "Found version on PyPI: '$PULLUP_VERSION'"
          if [ "$PULLUP_VERSION" = "$VERSION" ]; then
            echo "already_published=true" >> $GITHUB_ENV
            echo "Version $VERSION already exists on PyPI."
          else
            echo "already_published=false" >> $GITHUB_ENV
            echo "Version $VERSION not found on PyPI. Will upload."
          fi

      - name: Publish to PyPI
        if: env.already_published != 'true'
        uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip_existing: true

      - name: Version already published
        if: env.already_published == 'true'
        run: |
          echo "========================================"
          echo "Skipping PyPI publish - version already exists"
          echo "normadocs $VERSION is already published at:"
          echo "https://pypi.org/project/normadocs/$VERSION/"
          echo "========================================"
